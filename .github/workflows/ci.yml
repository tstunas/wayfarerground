name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Determine the base branch based on PR target or current branch
      # For git-flow: hotfix→main, others→develop
      - name: Determine Nx base branch
        id: base-branch
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR event: use the target branch
            BASE_BRANCH="origin/${{ github.base_ref }}"
          else
            # Push event: use the current branch
            CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
            if [[ "$CURRENT_BRANCH" == "main" ]]; then
              BASE_BRANCH="origin/main"
            else
              BASE_BRANCH="origin/develop"
            fi
          fi
          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT
          echo "Using base branch: $BASE_BRANCH"
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Setup Node first
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Setup pnpm
      - uses: pnpm/action-setup@v2
        with:
          version: 10

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      - run: pnpm dlx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e"

      - run: pnpm install --frozen-lockfile

      # Cache Playwright browsers
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: pnpm exec playwright install --with-deps

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      # - run: pnpm exec nx record -- echo Hello World
      # When you enable task distribution, run the e2e-ci task instead of e2e
      # For Nx Cloud: use nx affected to only run tasks for changed files
      # Base branch determined by git-flow strategy (main/develop)
      - run: pnpm exec nx affected --base=${{ steps.base-branch.outputs.base_branch }} --head=HEAD -t lint test build e2e
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: pnpm exec nx fix-ci
        if: always()
